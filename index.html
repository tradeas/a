<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="theme-color" content="#0b0e11" />
<title>Señor Tradello</title>

<style>
:root{
  --bg:#0b0e11;
  --text:#eaeaea;
  --gold1:#e6c77a;
  --gold2:#c9a24d;
  --stroke:rgba(255,255,255,.10);
  --shadow:rgba(0,0,0,.55);
}
*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(900px 500px at 50% 25%, rgba(201,162,77,.14), transparent 60%),
    radial-gradient(700px 400px at 20% 85%, rgba(230,199,122,.10), transparent 60%),
    linear-gradient(180deg, #07090b, var(--bg));
  overflow:hidden;
}

.wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.card{
  width:min(960px, 100%);
  display:grid;
  grid-template-columns: 1.05fr .95fr;
  gap:28px;
  padding:28px;
  border-radius:22px;
  background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
  border:1px solid var(--stroke);
  box-shadow: 0 25px 80px var(--shadow);
}

.visual{
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.10);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:320px;
}

.visual img{
  width:100%;
  height:100%;
  object-fit:contain;
  padding:18px;
}

.content{
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.brand{
  letter-spacing:.28em;
  text-transform:uppercase;
  font-size:12px;
  color:rgba(230,230,230,.70);
  margin-bottom:10px;
}

h1{
  margin:0 0 14px 0;
  font-weight:700;
  line-height:1.05;
  font-size:36px;
}

.desc{
  margin:0 0 18px 0;
  font-size:16px;
  line-height:1.55;
}

.btn{
  border:1px solid rgba(230,199,122,.55);
  background: linear-gradient(180deg, rgba(230,199,122,.18), rgba(201,162,77,.10));
  color:var(--text);
  padding:12px 16px;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  gap:10px;
}
</style>

</head>

<body>

<main class="wrap">
<section class="card">

<div class="visual">
  <img src="crypto.png" alt="Crypto">
</div>

<div class="content">

<div class="brand">Señor Tradello</div>

<h1>
Анализ рынка<br/>
фьючерсов
</h1>

<p class="desc">
Информация и наблюдения.
</p>

<a class="btn"
id="tgBtn"
href="https://t.me/+O997sVfPkng4NDIy"
target="_blank"
rel="noopener">
Открыть →
</a>

</div>
</section>
</main>


<script>
(function () {

var btn = document.getElementById('tgBtn');
if (!btn) return;

btn.addEventListener('click', function () {

if (typeof fbq === 'function') {
  fbq('track', 'Lead');
}

if (typeof ttq === 'function') {
  ttq.track('Lead');
}

});

})();
</script>

</body>
</html>
